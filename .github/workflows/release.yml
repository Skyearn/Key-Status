name: Build and Release macOS App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build (Release)
        run: |
          set -euo pipefail
          PROJECT_ROOT="$GITHUB_WORKSPACE"
          DERIVED_DATA_PATH="$PROJECT_ROOT/build/DerivedData"

          xcodebuild \
            -project "$PROJECT_ROOT/KeyStatus.xcodeproj" \
            -scheme "KeyStatus" \
            -configuration Release \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            clean build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Package app
        run: |
          set -euo pipefail
          mkdir -p dist
          APP_PATH="$GITHUB_WORKSPACE/build/DerivedData/Build/Products/Release/KeyStatus.app"
          cp -R "$APP_PATH" "dist/KeyStatus.app"
          xattr -cr "dist/KeyStatus.app" || true
          cd dist
          zip -r "KeyStatus-macOS-${GITHUB_REF_NAME}.zip" "KeyStatus.app"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/KeyStatus-macOS-*.zip
          generate_release_notes: true
